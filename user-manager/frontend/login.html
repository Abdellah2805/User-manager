<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - UserManager</title>
    <style>
        :root {
    --bg-color: #1a1a2e;
    --text-color: #f0f0f0;
    --primary-color: #3498db;
    --shadow-color: rgba(0, 0, 0, 0.3);
}

        /* Fichier : frontend/styles/login.css */

body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-container {
    background: #232334;
    padding: 3rem;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    width: 100%;
    max-width: 450px;
    text-align: center;
}

.login-header {
    margin-bottom: 2rem;
}

.login-header i {
    font-size: 3rem;
    color: var(--primary-color);
}

.login-header h2 {
    font-size: 1.8rem;
    margin: 0.5rem 0;
    color: var(--text-color);
}

.login-header p {
    color: #a0a0b2;
    font-size: 0.9rem;
}

.form-group {
    text-align: left;
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: bold;
    color: #ccc;
}

.form-group label i {
    margin-right: 0.5rem;
    color: #a0a0b2;
}

.form-group input {
    width: 100%;
    padding: 0.75rem 1rem;
    background-color: #1a1a2e;
    border: 1px solid #4a4a6e;
    border-radius: 8px;
    color: #fff;
    box-sizing: border-box;
    transition: border-color 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: var(--primary-color);
}

.login-btn {
    width: 100%;
    padding: 0.8rem;
    background-color: var(--primary-color);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    transition: background-color 0.3s;
}

.login-btn:hover {
    background-color: #2980b9;
}

.login-btn i {
    margin-right: 0.5rem;
}

.demo-info {
    margin-top: 2rem;
    background-color: #2e2e42;
    padding: 1rem;
    border-radius: 8px;
    text-align: left;
    font-size: 0.9rem;
    border-left: 4px solid var(--primary-color);
}

.demo-info p {
    margin: 0.5rem 0;
    color: #a0a0b2;
}
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-shield-halved"></i>
            <h2>UserManager</h2>
            <p>Connectez-vous pour accéder au dashboard</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">
                    <i class="fa-solid fa-envelope"></i> Email:
                </label>
                <input type="email" id="email" placeholder="admin@usermanager.com" required>
            </div>
            <div class="form-group">
                <label for="password">
                    <i class="fa-solid fa-lock"></i> Mot de passe:
                </label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            <button type="submit" class="login-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Se connecter
            </button>
        </form>
        <div id="message" class="message"></div>
        <div class="demo-info">
            <p><strong>Compte de démonstration:</strong></p>
            <p>Email: admin@usermanager.com</p>
            <p>Mot de passe: admin123</p>
        </div>
    </div>

    <script src="scripts/login.js"></script>
</body>
</html>
